{% extends "base_generic.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 mt-4">
            <div class="card-header bg-light border-bottom-0 pt-4 pb-0">
                <h4 class="mb-0">{{ bookinstance.book }}</h4>
            </div>
            <div class="card-body">
                <form action="" method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    
                    <div class="d-flex gap-2 mt-4">
                        <input type="submit" class="btn btn-primary w-auto" value="Submit Renewal">
                        <a href="{% url 'all-borrowed' %}" class="btn btn-outline-secondary w-auto">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
