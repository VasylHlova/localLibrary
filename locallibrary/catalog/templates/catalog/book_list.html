{% extends 'base_generic.html' %}

{% block content %}
    <h1 class="mb-4">Book List</h1>

    {% if book_list %}
        <div class="row">
            <div class="col-12">
                
                {% for book in book_list %}
                    <div class="card mb-3 w-50 bg-light shadow-sm border-0">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            
                            <div>
                                <h5 class="card-title mb-1">
                                    <a href="{{ book.get_absolute_url }}" class="text-decoration-none text-secondary">
                                        {{ book.title }}
                                    </a>
                                </h5>
                                <h6 class="card-subtitle text-muted">
                                    {{ book.author }}
                                </h6>
                            </div>

                            <a href="{{ book.get_absolute_url }}" class="btn btn-outline-info btn-sm">
                                See more
                            </a>

                        </div>
                    </div>
                {% endfor %}

            </div>
        </div>

    {% else %}
        <div class="alert alert-warning" role="alert">
            There are no books in the library.
        </div>
    {% endif %}
{% endblock %}
