services:
  db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    expose:
      - 5432

  redis:
    image: redis:7-alpine
    restart: always
    expose:
      - 6379

  server:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "python locallibrary/manage.py migrate && python locallibrary/manage.py seed_db && python locallibrary/manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=${POSTGRES_HOST}
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /app
          ignore:
            - .venv/
            - __pycache__/
            - .git/
            - migrations/
        - action: rebuild
          path: pyproject.toml
        - action: rebuild
          path: uv.lock
    volumes:
      - .:/app
      - /app/.venv
      - static_volume_dev:/app/locallibrary/static
      - media_volume_dev:/app/locallibrary/media

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/locallibrary
    command: celery -A infrastructure worker -l info
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/locallibrary
    command: celery -A infrastructure beat -l info
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started


volumes:
  postgres_data_dev:
  static_volume_dev:
  media_volume_dev: