services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    expose:
      - 5432

  redis:
    image: redis:7-alpine
    restart: always
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
      build:
        context: .
        dockerfile: Dockerfile
      ports:
        - "8000:8000"
      env_file:
        - .env
      environment:
        - DB_HOST=db
        - REDIS_URL=redis://redis:6379/1
      depends_on:
        db:
          condition: service_healthy
        redis:
          condition: service_healthy
      develop:
        watch:
          - action: sync+restart
            path: .
            target: /app
            ignore:
              - .venv/
              - __pycache__/
              - .git/
              - .ruff_cache/
              - migrations/  

          - action: rebuild
            path: pyproject.toml
          - action: rebuild
            path: uv.lock
      volumes:
        - .:/app
        - /app/.venv
        - static_volume:/app/locallibrary/static
        - media_volume:/app/locallibrary/media

volumes:
  postgres_data:
  static_volume:
  media_volume: